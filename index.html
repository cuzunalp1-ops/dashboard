<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Evofone Teknik Servis — Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Evofone" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0b0d10;
      --surface:#13161b;
      --border:#1f2530;
      --accent:#f97316;
      --accent2:#fbbf24;
      --text:#e2e8f0;
      --muted:#64748b;
      --nav-h:52px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:'Syne',sans-serif;
      overflow:hidden;
    }

    /* iOS safe area support */
    @supports(padding: env(safe-area-inset-top)) {
      nav { padding-top: env(safe-area-inset-top); }
      .frame-wrap { bottom: env(safe-area-inset-bottom); }
    }

    .accent-bar{
      position:fixed;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      z-index:200;
    }

    nav{
      position:fixed;top:0;left:0;right:0;
      height:var(--nav-h);
      background:rgba(11,13,16,0.92);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;
      padding:0 20px;gap:16px;
      z-index:100;
    }

    .logo-img{height:28px}
    .nav-divider{width:1px;height:20px;background:var(--border)}
    .nav-subtitle{
      font-family:'DM Mono',monospace;
      font-size:10px;color:var(--muted);
      letter-spacing:.1em;text-transform:uppercase;
    }

    .nav-sep{flex:1}

    .status-dot{
      width:7px;height:7px;background:#22c55e;
      border-radius:50%;
      box-shadow:0 0 8px #22c55e;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.4}
    }

    .status-label{
      font-family:'DM Mono',monospace;
      font-size:10px;color:var(--muted);
      letter-spacing:.08em;text-transform:uppercase;
    }

    .frame-wrap{
      position:fixed;
      top:var(--nav-h);left:0;right:0;bottom:0;
    }

    iframe{
      width:100%;height:100%;
      border:none;
      display:block;
    }

    #loader{
      position:fixed;
      inset:0;
      top:var(--nav-h);
      background:var(--bg);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
      z-index:50;
      transition:.4s;
    }

    #loader.hidden{
      opacity:0;
      pointer-events:none;
    }

    .spinner{
      width:40px;height:40px;
      border:2px solid var(--border);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .loader-text{
      font-family:'DM Mono',monospace;
      font-size:11px;
      color:var(--muted);
      letter-spacing:.1em;
      text-transform:uppercase;
    }

    #fallback{
      display:none;
      position:absolute;
      inset:0;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:12px;
      font-size:14px;
      color:var(--muted);
    }

    #fallback button{
      padding:10px 16px;
      background:var(--accent);
      border:none;
      color:white;
      cursor:pointer;
      border-radius:6px;
    }

    /* PWA Install Banner */
    #pwa-install{
      display:none;
      position:fixed;
      bottom:20px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      padding:12px 24px;
      border-radius:12px;
      font-size:13px;font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 20px rgba(249,115,22,0.4);
      z-index:300;
      animation:slideUp .5s ease-out;
      gap:8px;
      align-items:center;
    }

    #pwa-install .close-btn{
      background:none;border:none;color:white;
      font-size:18px;cursor:pointer;margin-left:12px;
      opacity:0.7;
    }

    #pwa-install .close-btn:hover{opacity:1}

    @keyframes slideUp{
      from{transform:translateX(-50%) translateY(100px);opacity:0}
      to{transform:translateX(-50%) translateY(0);opacity:1}
    }
  </style>
</head>
<body>

<div class="accent-bar"></div>

<nav>
  <img src="evo-logo.webp" class="logo-img" alt="Evofone"/>
  <div class="nav-divider"></div>
  <div class="nav-subtitle">Teknik Servis Dashboard</div>
  <div class="nav-sep"></div>
  <div class="status-dot"></div>
  <div class="status-label">Canlı</div>
</nav>

<div id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Panel yükleniyor…</div>
</div>

<div class="frame-wrap">
  <iframe id="dash"
    src=""
    allow="clipboard-write">
  </iframe>

  <div id="fallback">
    <div>Panel yüklenemedi</div>
    <button onclick="window.open('https://script.google.com/macros/s/AKfycbwZy7MOOWBjpp5hd2NiPJBDrELJ9iihRIiWaXilNqkxe3zNNTH9ggvq9zbA5XvDmHJtZw/exec','_blank')">
      Direkt Aç
    </button>
  </div>
</div>

<!-- PWA Install Banner -->
<div id="pwa-install">
  📲 Uygulamayı Yükle
  <button class="close-btn" onclick="event.stopPropagation();document.getElementById('pwa-install').style.display='none';localStorage.setItem('pwa-dismissed','1')">✕</button>
</div>

<script>
  // Iframe loader
  const iframe = document.getElementById("dash");
  const loader = document.getElementById("loader");
  const fallback = document.getElementById("fallback");

  iframe.onload = () => {
    loader.classList.add("hidden");
  };

  setTimeout(() => {
    if (!loader.classList.contains("hidden")) {
      fallback.style.display = "flex";
      loader.classList.add("hidden");
    }
  }, 8000);

  // PWA Service Worker Registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  }

  // PWA Install Prompt
  let deferredPrompt;
  const installBanner = document.getElementById('pwa-install');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Show banner if not dismissed
    if (!localStorage.getItem('pwa-dismissed')) {
      installBanner.style.display = 'flex';
    }
  });

  installBanner.addEventListener('click', async (e) => {
    if (e.target.classList.contains('close-btn')) return;
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      installBanner.style.display = 'none';
    }
    deferredPrompt = null;
  });

  // iOS install detection
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone && !localStorage.getItem('pwa-dismissed')) {
    installBanner.innerHTML = '📲 Ana Ekrana Ekle: Paylaş → Ana Ekrana Ekle <button class="close-btn" onclick="event.stopPropagation();document.getElementById(\'pwa-install\').style.display=\'none\';localStorage.setItem(\'pwa-dismissed\',\'1\')">✕</button>';
    installBanner.style.display = 'flex';
    installBanner.style.cursor = 'default';
  }
</script>

</body>
</html>
